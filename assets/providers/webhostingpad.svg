<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 96" role="img" aria-labelledby="title desc">
  <title id="title">WebHostingPad logo</title>
  <desc id="desc">A clean local wordmark tile for WebHostingPad shown for provider identification.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="238" height="94" rx="22" fill="#ffffff" stroke="#dbe4f0" stroke-width="2"/>
  <rect x="12" y="14" width="68" height="68" rx="18" fill="url(#g)"/>
  <text x="46" y="56" text-anchor="middle" font-size="20" font-weight="800" font-family="Arial, Helvetica, sans-serif" fill="#ffffff">WHP</text>
  <text x="94" y="47" font-size="18" font-weight="800" font-family="Arial, Helvetica, sans-serif" fill="#0f172a">WebHostingPad</text>
  <text x="94" y="69" font-size="11" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#64748b">budget hosting</text>
